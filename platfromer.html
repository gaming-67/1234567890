<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Platformer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #ui {
    display: flex;
    gap: 40px;
    margin-bottom: 10px;
    color: #fff;
    font-size: 18px;
    text-shadow: 0 0 10px #4af;
    letter-spacing: 2px;
  }
  #ui span { color: #ffd700; }
  canvas {
    border: 3px solid #4af;
    box-shadow: 0 0 30px #4af8, 0 0 60px #4af4;
    image-rendering: pixelated;
  }
  #controls {
    margin-top: 10px;
    color: #778;
    font-size: 13px;
    letter-spacing: 1px;
  }
  #message {
    position: absolute;
    color: #fff;
    font-size: 36px;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 20px #4af;
    letter-spacing: 4px;
    display: none;
    text-align: center;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="ui">
  <div>❤️ <span id="lives">3</span></div>
  <div>⭐ <span id="score">0</span></div>
  <div>LEVEL <span id="level">1</span></div>
</div>
<div id="message"></div>
<canvas id="c" width="800" height="450"></canvas>
<div id="controls">← → MOVE &nbsp;|&nbsp; SPACE / ↑ JUMP &nbsp;|&nbsp; Double jump! &nbsp;|&nbsp; Stomp enemies &nbsp;|&nbsp; R = restart</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
let keys = {};
let score = 0, lives = 3, level = 1;
let gameState = 'playing';
let cam = { x: 0 };
const GRAVITY = 0.55, JUMP = -13, SPEED = 4.5;
let p = {};
function resetPlayer() {
  p = { x: 80, y: 200, w: 28, h: 36, vx: 0, vy: 0, onGround: false, jumps: 0, dir: 1, frame: 0, frameTimer: 0, invincible: 0 };
}
resetPlayer();
function makeLevel(lvl) {
  let platforms = [], coins = [], enemies = [], goal = null;
  if (lvl === 1) {
    platforms = [
      {x:0,y:380,w:300,h:20,col:'#3a7d44'},{x:340,y:380,w:200,h:20,col:'#3a7d44'},
      {x:580,y:380,w:300,h:20,col:'#3a7d44'},{x:900,y:380,w:400,h:20,col:'#3a7d44'},
      {x:180,y:300,w:120,h:16,col:'#6b4226'},{x:380,y:260,w:100,h:16,col:'#6b4226'},
      {x:560,y:220,w:120,h:16,col:'#6b4226'},{x:740,y:300,w:100,h:16,col:'#6b4226'},
      {x:900,y:250,w:140,h:16,col:'#6b4226'},{x:1100,y:200,w:120,h:16,col:'#6b4226'},
    ];
    coins = [{x:200,y:270},{x:240,y:270},{x:280,y:270},{x:400,y:230},{x:440,y:230},
      {x:570,y:190},{x:610,y:190},{x:650,y:190},{x:760,y:270},{x:800,y:270},
      {x:920,y:220},{x:960,y:220},{x:1120,y:170},{x:1160,y:170},{x:700,y:350},{x:750,y:350}]
      .map(c=>({...c,collected:false,bob:Math.random()*Math.PI*2}));
    enemies = [
      {x:400,y:355,w:28,h:28,vx:1.5,dir:1},{x:640,y:355,w:28,h:28,vx:1.8,dir:1},
      {x:950,y:355,w:28,h:28,vx:2,dir:1},{x:580,y:195,w:28,h:28,vx:1.5,dir:1},
    ];
    goal = {x:1200,y:155,w:36,h:44};
    return {platforms,coins,enemies,goal,width:1400};
  }
  if (lvl === 2) {
    platforms = [
      {x:0,y:400,w:200,h:20,col:'#2d5a8e'},{x:250,y:340,w:100,h:16,col:'#4a2d8e'},
      {x:420,y:280,w:100,h:16,col:'#4a2d8e'},{x:600,y:220,w:80,h:16,col:'#4a2d8e'},
      {x:760,y:300,w:120,h:16,col:'#4a2d8e'},{x:950,y:240,w:100,h:16,col:'#4a2d8e'},
      {x:1120,y:180,w:120,h:16,col:'#4a2d8e'},{x:1300,y:400,w:300,h:20,col:'#2d5a8e'},
      {x:1100,y:400,w:160,h:20,col:'#2d5a8e'},{x:850,y:400,w:200,h:20,col:'#2d5a8e'},
    ];
    coins = [{x:260,y:310},{x:290,y:310},{x:320,y:310},{x:430,y:250},{x:460,y:250},
      {x:490,y:250},{x:610,y:190},{x:640,y:190},{x:770,y:270},{x:810,y:270},
      {x:960,y:210},{x:1000,y:210},{x:1130,y:150},{x:1170,y:150},{x:1210,y:150}]
      .map(c=>({...c,collected:false,bob:Math.random()*Math.PI*2}));
    enemies = [
      {x:260,y:315,w:28,h:28,vx:1.5,dir:1},{x:430,y:255,w:28,h:28,vx:2,dir:1},
      {x:870,y:375,w:28,h:28,vx:2,dir:1},{x:1100,y:375,w:28,h:28,vx:2.2,dir:1},
      {x:1310,y:375,w:28,h:28,vx:2.5,dir:1},
    ];
    goal = {x:1480,y:360,w:36,h:44};
    return {platforms,coins,enemies,goal,width:1700};
  }
  platforms = [
    {x:0,y:400,w:160,h:20,col:'#7d3a3a'},{x:220,y:350,w:80,h:16,col:'#8e2d2d'},
    {x:380,y:290,w:80,h:16,col:'#8e2d2d'},{x:540,y:230,w:60,h:16,col:'#8e2d2d'},
    {x:680,y:290,w:80,h:16,col:'#8e2d2d'},{x:840,y:230,w:60,h:16,col:'#8e2d2d'},
    {x:980,y:170,w:80,h:16,col:'#8e2d2d'},{x:1140,y:230,w:80,h:16,col:'#8e2d2d'},
    {x:1300,y:290,w:80,h:16,col:'#8e2d2d'},{x:1450,y:400,w:300,h:20,col:'#7d3a3a'},
  ];
  coins = [{x:230,y:320},{x:260,y:320},{x:390,y:260},{x:420,y:260},{x:550,y:200},
    {x:575,y:200},{x:690,y:260},{x:720,y:260},{x:850,y:200},{x:875,y:200},
    {x:990,y:140},{x:1020,y:140},{x:1050,y:140},{x:1150,y:200},{x:1180,y:200},
    {x:1310,y:260},{x:1340,y:260}]
    .map(c=>({...c,collected:false,bob:Math.random()*Math.PI*2}));
  enemies = [
    {x:230,y:325,w:28,h:28,vx:2,dir:1},{x:390,y:265,w:28,h:28,vx:2.5,dir:1},
    {x:690,y:265,w:28,h:28,vx:2.5,dir:1},{x:1150,y:205,w:28,h:28,vx:3,dir:1},
    {x:1310,y:265,w:28,h:28,vx:3,dir:1},{x:1460,y:375,w:28,h:28,vx:3,dir:1},
  ];
  goal = {x:1660,y:360,w:36,h:44};
  return {platforms,coins,enemies,goal,width:1900};
}
let lv = makeLevel(level);
function rectOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function showMessage(msg,sub,delay){
  const el=document.getElementById('message');
  el.innerHTML=msg+(sub?`<br><span style="font-size:18px;color:#aaa">${sub}</span>`:'');
  el.style.display='block';
  if(delay)setTimeout(()=>el.style.display='none',delay);
}
function hideMessage(){document.getElementById('message').style.display='none';}
let t=0;
function update(){
  if(gameState!=='playing')return;
  t++;
  if(keys['ArrowLeft']||keys['KeyA']){p.vx=-SPEED;p.dir=-1;}
  else if(keys['ArrowRight']||keys['KeyD']){p.vx=SPEED;p.dir=1;}
  else p.vx*=0.75;
  p.vy+=GRAVITY; p.x+=p.vx; p.y+=p.vy;
  if(p.x<0)p.x=0;
  p.onGround=false;
  for(let pl of lv.platforms){
    if(rectOverlap(p,pl)){
      let ox=Math.min(p.x+p.w,pl.x+pl.w)-Math.max(p.x,pl.x);
      let oy=Math.min(p.y+p.h,pl.y+pl.h)-Math.max(p.y,pl.y);
      if(oy<ox){
        if(p.vy>0&&p.y+p.h-p.vy<=pl.y+4){p.y=pl.y-p.h;p.vy=0;p.onGround=true;p.jumps=0;}
        else if(p.vy<0){p.y=pl.y+pl.h;p.vy=0;}
      }else{
        if(p.vx>0)p.x=pl.x-p.w; else p.x=pl.x+pl.w; p.vx=0;
      }
    }
  }
  if(p.y>H+100){die();return;}
  if(p.invincible>0)p.invincible--;
  for(let e of lv.enemies){
    if(e.dead)continue;
    e.x+=e.vx*e.dir;
    let bounce=true;
    for(let pl of lv.platforms){
      if(e.x+e.w>pl.x&&e.x<pl.x+pl.w&&Math.abs(e.y+e.h-pl.y)<6){
        bounce=false;
        if(e.x<=pl.x||e.x+e.w>=pl.x+pl.w-1)e.dir*=-1;
      }
    }
    if(bounce)e.dir*=-1;
    if(p.invincible===0&&rectOverlap(p,e)){
      if(p.vy>1&&p.y+p.h<e.y+e.h*0.6){e.dead=true;p.vy=-9;score+=50;document.getElementById('score').textContent=score;}
      else{die();return;}
    }
  }
  for(let c of lv.coins){
    if(!c.collected){
      c.bob+=0.07;
      if(rectOverlap(p,{x:c.x-10,y:c.y-10+Math.sin(c.bob)*4,w:20,h:20})){
        c.collected=true;score+=10;document.getElementById('score').textContent=score;
      }
    }
  }
  if(rectOverlap(p,lv.goal)){
    if(level<3){
      level++;lv=makeLevel(level);resetPlayer();cam.x=0;
      showMessage(`LEVEL ${level}`,'Get ready!',1800);
      document.getElementById('level').textContent=level;
    }else{
      gameState='win';
      showMessage('YOU WIN! 🎉',`Final Score: ${score} — Press R to play again`,0);
    }
  }
  let tc=p.x-W/3; tc=Math.max(0,Math.min(tc,lv.width-W));
  cam.x+=(tc-cam.x)*0.12;
  p.frameTimer++;
  if(Math.abs(p.vx)>0.5&&p.frameTimer%8===0)p.frame=(p.frame+1)%4;
  if(Math.abs(p.vx)<0.5)p.frame=0;
  document.getElementById('lives').textContent=lives;
}
function die(){
  lives--;document.getElementById('lives').textContent=lives;
  if(lives<=0){gameState='gameover';showMessage('GAME OVER',`Score: ${score} — Press R to restart`,0);return;}
  resetPlayer();cam.x=0;p.invincible=100;
  showMessage('💀 Oops!','',800);
}
const SKIES=[['#0d1b2a','#1a2e1a'],['#1a0d2e','#0d0d2e'],['#2a0d0d','#1a0a0a']];
function drawBG(){
  let s=SKIES[level-1];
  let g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,s[0]);g.addColorStop(1,s[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.7)';
  for(let i=0;i<70;i++){
    let sx=((i*173)%lv.width)-cam.x*0.15;
    if(sx<0)sx+=lv.width; sx=sx%W;
    let sy=(i*97)%(H*0.55);
    if(sx>0&&sx<W){let z=i%5===0?2:1;ctx.fillRect(sx,sy,z,z);}
  }
  const mc=level===1?'#1e3a20':level===2?'#181830':'#301818';
  ctx.fillStyle=mc;
  for(let i=0;i<7;i++){
    let mx=(i*220-cam.x*0.18)%(W+200)-80;
    let mh=70+(i*53)%70;
    ctx.beginPath();ctx.moveTo(mx,H);ctx.lineTo(mx+90,H-mh);ctx.lineTo(mx+180,H);ctx.fill();
  }
}
function drawPlatform(pl){
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(pl.x-cam.x+4,pl.y+4,pl.w,pl.h);
  ctx.fillStyle=pl.col;ctx.fillRect(pl.x-cam.x,pl.y,pl.w,pl.h);
  const tops={['#3a7d44']:'#52a85e',['#6b4226']:'#8b6347',['#2d5a8e']:'#3d75ba',['#4a2d8e']:'#6b4bb0',['#7d3a3a']:'#a84040',['#8e2d2d']:'#b05050'};
  ctx.fillStyle=tops[pl.col]||'#888';ctx.fillRect(pl.x-cam.x,pl.y,pl.w,6);
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(pl.x-cam.x,pl.y,pl.w,2);
  ctx.fillStyle='rgba(0,0,0,0.1)';
  for(let bx=pl.x;bx<pl.x+pl.w;bx+=28)ctx.fillRect(bx-cam.x,pl.y+6,1,pl.h-6);
}
function drawCoin(c){
  if(c.collected)return;
  let cy=c.y+Math.sin(c.bob)*4,cx2=c.x-cam.x;
  ctx.beginPath();ctx.arc(cx2,cy,11,0,Math.PI*2);
  ctx.fillStyle='rgba(255,215,0,0.18)';ctx.fill();
  ctx.beginPath();ctx.arc(cx2,cy,7,0,Math.PI*2);
  ctx.fillStyle='#ffd700';ctx.fill();
  ctx.beginPath();ctx.arc(cx2,cy,5,0,Math.PI*2);
  ctx.fillStyle='#ffec6e';ctx.fill();
  ctx.beginPath();ctx.arc(cx2+1,cy-1,2,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
}
const ECOLS=[['#e05050','#a03030'],['#9050e0','#6030a0'],['#e08050','#a05030']];
function drawEnemy(e){
  if(e.dead)return;
  let ex=e.x-cam.x;
  let[c,d]=ECOLS[level-1];
  ctx.fillStyle=c;ctx.fillRect(ex,e.y,e.w,e.h);
  ctx.fillStyle=d;ctx.fillRect(ex,e.y+e.h-8,e.w,8);
  ctx.fillStyle='#fff';let ey=e.dir>0?ex+14:ex+2;
  ctx.fillRect(ey,e.y+6,8,6);
  ctx.fillStyle='#111';ctx.fillRect(ey+(e.dir>0?4:0),e.y+8,4,4);
  ctx.fillStyle=d;
  for(let i=0;i<3;i++)ctx.fillRect(ex+3+i*8,e.y-5,5,7);
}
function drawGoal(){
  let g=lv.goal,gx=g.x-cam.x;
  ctx.fillStyle='#999';ctx.fillRect(gx+17,g.y-55,4,g.h+55);
  let w=Math.sin(t*0.1)*5;
  ctx.fillStyle='#ff3333';
  ctx.beginPath();ctx.moveTo(gx+21,g.y-55);
  ctx.lineTo(gx+21+30+w,g.y-40+w*0.5);ctx.lineTo(gx+21,g.y-26);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 13px serif';ctx.fillText('★',gx+24,g.y-39);
  ctx.fillStyle='#666';ctx.fillRect(gx+7,g.y+g.h-6,24,6);
  // glow
  let gl=ctx.createRadialGradient(gx+19,g.y,5,gx+19,g.y,35);
  gl.addColorStop(0,'rgba(255,255,100,0.15)');gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl;ctx.beginPath();ctx.arc(gx+19,g.y+g.h/2,35,0,Math.PI*2);ctx.fill();
}
function drawPlayer(){
  if(p.invincible>0&&Math.floor(p.invincible/4)%2===0)return;
  let px=p.x-cam.x;
  ctx.save();
  if(p.dir===-1){ctx.scale(-1,1);px=-px-p.w;}
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();
  ctx.ellipse(px+p.w/2,p.y+p.h+2,13,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#4a90d9';ctx.fillRect(px+2,p.y+16,p.w-4,p.h-16);
  ctx.fillStyle='#5ba8f0';ctx.fillRect(px+4,p.y+17,5,p.h-18);
  let lo=p.onGround?Math.sin(p.frame*Math.PI/2)*5:0;
  ctx.fillStyle='#2a5fa0';
  ctx.fillRect(px+2,p.y+p.h-12,10,12+lo);ctx.fillRect(px+p.w-12,p.y+p.h-12,10,12-lo);
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(px+1,p.y+p.h-4+lo,12,5);ctx.fillRect(px+p.w-13,p.y+p.h-4-lo,12,5);
  ctx.fillStyle='#f5c5a0';ctx.fillRect(px+3,p.y,p.w-6,20);
  ctx.fillStyle='#5a3010';ctx.fillRect(px+3,p.y,p.w-6,7);ctx.fillRect(px+p.w-8,p.y,5,10);
  ctx.fillStyle='#1a1a4a';ctx.fillRect(px+p.w-12,p.y+9,5,5);
  ctx.fillStyle='#fff';ctx.fillRect(px+p.w-11,p.y+9,2,2);
  let ao=p.onGround?Math.sin(p.frame*Math.PI/2)*4:-3;
  ctx.fillStyle='#4a90d9';
  ctx.fillRect(px-4,p.y+16+ao,6,14);ctx.fillRect(px+p.w-2,p.y+16-ao,6,14);
  ctx.fillStyle='#f5c5a0';
  ctx.fillRect(px-4,p.y+28+ao,6,5);ctx.fillRect(px+p.w-2,p.y+28-ao,6,5);
  ctx.restore();
}
function draw(){
  ctx.clearRect(0,0,W,H);
  drawBG();
  for(let pl of lv.platforms)drawPlatform(pl);
  for(let c of lv.coins)drawCoin(c);
  drawGoal();
  for(let e of lv.enemies)drawEnemy(e);
  drawPlayer();
  let v=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.9);
  v.addColorStop(0,'transparent');v.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=v;ctx.fillRect(0,0,W,H);
}
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&gameState==='playing'){
    if(p.jumps<2){p.vy=JUMP-(p.jumps*2);p.jumps++;e.preventDefault();}
  }
  if(e.code==='KeyR'&&(gameState==='gameover'||gameState==='win')){
    score=0;lives=3;level=1;lv=makeLevel(1);resetPlayer();cam.x=0;gameState='playing';
    hideMessage();
    document.getElementById('score').textContent=0;
    document.getElementById('lives').textContent=3;
    document.getElementById('level').textContent=1;
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
